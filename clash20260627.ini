[custom]

; ============================================================
; 基础设置
; ============================================================

; 添加 Emoji，方便识别节点
emoji=true
add_emoji=true
remove_old_emoji=true

; 开启 UDP。Telegram、游戏、部分流媒体可能需要
udp=true

; 节点排序
sort=true

; 不跳过证书验证，默认更稳
scv=false

; 不强制过滤未知节点
fdn=false


; ============================================================
; 节点过滤
; 过滤机场的流量提示、套餐提示、官网提示等伪节点
; ============================================================

exclude_remarks=(官网|流量|套餐|到期|剩余|过期|失效|订阅|更新|客服|邮箱|Traffic|Expire|Expired|Reset|官网|网址|工单)


; ============================================================
; 策略组
; ============================================================

; 主选择组
custom_proxy_group=🚀 节点选择`select`[]♻️ 自动选择`[]🇭🇰 香港自动`[]🇸🇬 新加坡自动`[]🇯🇵 日本自动`[]🇺🇸 美国自动`[]🎯 全球直连`.*

; 自动测速组
custom_proxy_group=♻️ 自动选择`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; AI 服务：ChatGPT / Claude / Gemini / Copilot
; 建议优先美国、日本、新加坡
custom_proxy_group=✨ AI服务`select`[]🇺🇸 美国自动`[]🇯🇵 日本自动`[]🇸🇬 新加坡自动`[]🚀 节点选择`.*

; GitHub / 开发工具
custom_proxy_group=💻 开发平台`select`[]🚀 节点选择`[]🇺🇸 美国自动`[]🇯🇵 日本自动`[]🇸🇬 新加坡自动`[]🎯 全球直连`.*

; Telegram
custom_proxy_group=📲 电报消息`select`[]🚀 节点选择`[]🇸🇬 新加坡自动`[]🇭🇰 香港自动`.*

; 流媒体
custom_proxy_group=🎬 流媒体`select`[]🚀 节点选择`[]🇭🇰 香港自动`[]🇸🇬 新加坡自动`[]🇯🇵 日本自动`[]🇺🇸 美国自动`.*

; Apple 服务
; 默认直连更稳。App Store 下载慢时再手动切代理
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 节点选择`.*

; Microsoft 服务
; Windows Update / Office 登录一般直连更稳
custom_proxy_group=🪟 微软服务`select`[]🎯 全球直连`[]🚀 节点选择`.*

; 直连组
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; 广告拦截
custom_proxy_group=🛑 广告拦截`select`[]REJECT`[]DIRECT

; 兜底
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 节点选择`[]♻️ 自动选择`[]🎯 全球直连`.*


; ============================================================
; 地区自动组
; 如果你的机场没有对应地区节点，该组可能为空，属于正常情况
; ============================================================

custom_proxy_group=🇭🇰 香港自动`url-test`(港|香港|HK|Hong Kong|HongKong)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡自动`url-test`(新加坡|狮城|SG|Singapore)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本自动`url-test`(日本|东京|大阪|JP|Japan|Tokyo|Osaka)`http://www.gstatic.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国自动`url-test`(美国|美西|美东|洛杉矶|圣何塞|US|USA|United States|America|Los Angeles|San Jose)`http://www.gstatic.com/generate_204`300,,50


; ============================================================
; 规则生成设置
; ============================================================

enable_rule_generator=true
overwrite_original_rules=true


; ============================================================
; 规则集：直连优先
; ============================================================

ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/LocalAreaNetwork.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/UnBan.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/GoogleCN.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/SteamCN.list


; ============================================================
; 广告拦截
; ============================================================

ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list
ruleset=🛑 广告拦截,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanProgramAD.list


; ============================================================
; AI 服务
; ChatGPT / Claude / Gemini / Copilot
; ============================================================

ruleset=✨ AI服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list
ruleset=✨ AI服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.list
ruleset=✨ AI服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.list
ruleset=✨ AI服务,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.list


; ============================================================
; 开发平台
; GitHub / Git / VS Code / 开发环境优先走代理
; ============================================================

ruleset=💻 开发平台,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.list


; ============================================================
; 常用海外服务
; ============================================================

ruleset=📲 电报消息,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Telegram.list
ruleset=🎬 流媒体,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyMedia.list


; ============================================================
; Apple / Microsoft
; ============================================================

ruleset=🍎 苹果服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Apple.list
ruleset=🪟 微软服务,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Microsoft.list


; ============================================================
; 国内规则
; 放在 ProxyLite 前后都可以。
; 这里放在前面，优先保证国内服务直连。
; ============================================================

ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaDomain.list
ruleset=🎯 全球直连,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ChinaCompanyIp.list


; ============================================================
; 常规海外代理
; 没被上面单独命中的海外网站走这里
; ============================================================

ruleset=🚀 节点选择,https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/ProxyLite.list


; ============================================================
; 兜底规则
; ============================================================

ruleset=🎯 全球直连,[]GEOIP,CN
ruleset=🐟 漏网之鱼,[]FINAL
